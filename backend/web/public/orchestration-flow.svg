<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1c2733" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="960" height="420" fill="#f8fafc" rx="16"/>

  <text x="480" y="44" text-anchor="middle" font-size="20" font-weight="800" fill="#1c2733" letter-spacing="-0.5">How Foreman Orchestrates Your AI Workforce</text>
  <text x="480" y="66" text-anchor="middle" font-size="13" fill="#64748b">One conversation. Full coordination. You stay in control.</text>

  <g transform="translate(52, 100)">
    <rect x="0" y="0" width="160" height="130" rx="14" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="36" rx="14" fill="url(#blueGrad)"/>
    <rect x="0" y="20" width="160" height="16" fill="url(#blueGrad)"/>
    <circle cx="24" cy="18" r="10" fill="rgba(255,255,255,0.25)"/>
    <text x="24" y="22" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">1</text>
    <text x="92" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">You Describe</text>
    <text x="80" y="60" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">"I need a blog</text>
    <text x="80" y="78" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">post about our</text>
    <text x="80" y="96" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">new feature"</text>
    <text x="80" y="118" text-anchor="middle" font-size="9" fill="#64748b">Natural language</text>
  </g>
  <line x1="212" y1="165" x2="250" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6 3"/>

  <g transform="translate(255, 100)">
    <rect x="0" y="0" width="160" height="130" rx="14" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="36" rx="14" fill="url(#tealGrad)"/>
    <rect x="0" y="20" width="160" height="16" fill="url(#tealGrad)"/>
    <circle cx="24" cy="18" r="10" fill="rgba(255,255,255,0.25)"/>
    <text x="24" y="22" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">2</text>
    <text x="98" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Chief of Staff</text>
    <text x="80" y="60" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">Assigns the</text>
    <text x="80" y="78" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">right agent &amp;</text>
    <text x="80" y="96" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">creates a plan</text>
    <text x="80" y="118" text-anchor="middle" font-size="9" fill="#64748b">Auto-coordinated</text>
  </g>
  <line x1="415" y1="165" x2="453" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6 3"/>

  <g transform="translate(458, 100)">
    <rect x="0" y="0" width="160" height="130" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="36" rx="14" fill="url(#amberGrad)"/>
    <rect x="0" y="20" width="160" height="16" fill="url(#amberGrad)"/>
    <circle cx="24" cy="18" r="10" fill="rgba(255,255,255,0.25)"/>
    <text x="24" y="22" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">3</text>
    <text x="100" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">You Approve</text>
    <text x="80" y="60" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">Review the</text>
    <text x="80" y="78" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">plan card &amp;</text>
    <text x="80" y="96" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">give sign-off</text>
    <text x="80" y="118" text-anchor="middle" font-size="9" fill="#64748b">Full oversight</text>
  </g>
  <line x1="618" y1="165" x2="656" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6 3"/>

  <g transform="translate(661, 100)">
    <rect x="0" y="0" width="160" height="130" rx="14" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="36" rx="14" fill="url(#blueGrad)"/>
    <rect x="0" y="20" width="160" height="16" fill="url(#blueGrad)"/>
    <circle cx="24" cy="18" r="10" fill="rgba(255,255,255,0.25)"/>
    <text x="24" y="22" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">4</text>
    <text x="100" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Agent Executes</text>
    <text x="80" y="60" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">Assigned agent</text>
    <text x="80" y="78" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">does the work</text>
    <text x="80" y="96" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">autonomously</text>
    <text x="80" y="118" text-anchor="middle" font-size="9" fill="#64748b">Hands-off delivery</text>
  </g>
  <line x1="741" y1="230" x2="741" y2="268" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <g transform="translate(661, 273)">
    <rect x="0" y="0" width="160" height="110" rx="14" fill="#fff" stroke="#0d9488" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="36" rx="14" fill="url(#tealGrad)"/>
    <rect x="0" y="20" width="160" height="16" fill="url(#tealGrad)"/>
    <circle cx="24" cy="18" r="10" fill="rgba(255,255,255,0.25)"/>
    <text x="24" y="22" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">5</text>
    <text x="100" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">In Your Inbox</text>
    <text x="80" y="58" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">Results, decisions</text>
    <text x="80" y="76" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">&amp; sign-offs in</text>
    <text x="80" y="94" text-anchor="middle" font-size="13" fill="#1c2733" font-weight="600">one place</text>
  </g>

  <g transform="translate(132, 293)">
    <rect x="0" y="0" width="440" height="64" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 2" opacity="0.7"/>
    <text x="220" y="28" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="700">You talk to one point of contact. Foreman handles the rest.</text>
    <text x="220" y="48" text-anchor="middle" font-size="11" fill="#64748b">No juggling agents. No checking five dashboards. Your Chief of Staff coordinates everything.</text>
  </g>

  <g transform="translate(52, 385)">
    <circle cx="8" cy="8" r="5" fill="#2563eb"/>
    <text x="20" y="12" font-size="10" fill="#64748b">You</text>
    <circle cx="78" cy="8" r="5" fill="#0d9488"/>
    <text x="90" y="12" font-size="10" fill="#64748b">Chief of Staff</text>
    <circle cx="198" cy="8" r="5" fill="#f59e0b"/>
    <text x="210" y="12" font-size="10" fill="#64748b">Approval Gate</text>
    <circle cx="318" cy="8" r="5" fill="#2563eb"/>
    <text x="330" y="12" font-size="10" fill="#64748b">Agent Work</text>
    <circle cx="398" cy="8" r="5" fill="#0d9488"/>
    <text x="410" y="12" font-size="10" fill="#64748b">Inbox Results</text>
  </g>
</svg>