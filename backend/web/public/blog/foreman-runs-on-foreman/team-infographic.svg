  <line x1="300" y1="335" x2="260" y2="430" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="600" y1="335" x2="640" y2="430" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="760" y1="335" x2="800" y2="430" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>

  <g transform="translate(100, 450)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-30" cy="-3" r="15" fill="#eff6ff"/>
    <text x="-30" y="1" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">CC</text>
    <text x="15" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#1c2733">Claude Coder</text>
    <text x="15" y="8" text-anchor="middle" font-size="8" fill="#6b7280">Implementation</text>
  </g>

  <g transform="translate(260, 450)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-30" cy="-3" r="15" fill="#eff6ff"/>
    <text x="-30" y="1" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">UX</text>
    <text x="15" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#1c2733">UX Designer</text>
    <text x="15" y="8" text-anchor="middle" font-size="8" fill="#6b7280">Design &amp; research</text>
  </g>

  <g transform="translate(640, 450)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-30" cy="-3" r="15" fill="#eff6ff"/>
    <text x="-30" y="1" text-anchor="middle" font-size="9" fill="#2563eb" font-weight="700">CX</text>
    <text x="15" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#1c2733">Codex Coder</text>
    <text x="15" y="8" text-anchor="middle" font-size="8" fill="#6b7280">Alt. implementer</text>
  </g>

  <g transform="translate(800, 450)">
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-30" cy="-3" r="15" fill="#fef3c7"/>
    <text x="-30" y="1" text-anchor="middle" font-size="9" fill="#92400e" font-weight="700">QA</text>
    <text x="15" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#1c2733">QA Reviewer</text>
    <text x="15" y="8" text-anchor="middle" font-size="8" fill="#6b7280">Quality checks</text>
  </g>

  <rect x="40" y="540" width="820" height="50" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <circle cx="70" cy="565" r="8" fill="#22c55e"/>
  <text x="86" y="569" font-size="11" fill="#1c2733" font-weight="500">Coordinated via Paperclip orchestration</text>
  <circle cx="310" cy="565" r="8" fill="#2563eb"/>
  <text x="326" y="569" font-size="11" fill="#1c2733" font-weight="500">Heartbeat-driven execution</text>
  <circle cx="530" cy="565" r="8" fill="#f59e0b"/>
  <text x="546" y="569" font-size="11" fill="#1c2733" font-weight="500">Approval workflows</text>
  <circle cx="720" cy="565" r="8" fill="#6b7280"/>
  <text x="736" y="569" font-size="11" fill="#1c2733" font-weight="500">Chain of command</text>
</svg>
