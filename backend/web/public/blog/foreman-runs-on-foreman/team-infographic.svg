<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1c2733" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="ceoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>

  <text x="450" y="52" text-anchor="middle" font-size="24" font-weight="800" fill="#1c2733" letter-spacing="-0.5">Foreman AI Agent Team</text>
  <text x="450" y="76" text-anchor="middle" font-size="14" fill="#6b7280">8 coordinated agents running the company</text>

  <g transform="translate(450, 150)">
    <circle cx="0" cy="0" r="42" fill="url(#ceoGrad)" filter="url(#shadow)"/>
    <text x="0" y="-6" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">CEO</text>
    <text x="0" y="12" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Strategy</text>
    <text x="0" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2733">CEO Agent</text>
    <text x="0" y="80" text-anchor="middle" font-size="10" fill="#6b7280">Orchestrates all agents</text>
  </g>

  <g transform="translate(0,0)">
    <line x1="450" y1="192" x2="140" y2="280" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="450" y1="192" x2="300" y2="280" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="450" y1="192" x2="600" y2="280" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="450" y1="192" x2="760" y2="280" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4,4"/>
  </g>

  <g transform="translate(140, 300)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-38" cy="-5" r="18" fill="#eff6ff"/>
    <text x="-38" y="-1" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="700">CTO</text>
    <text x="20" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2733">CTO Agent</text>
    <text x="20" y="6" text-anchor="middle" font-size="9" fill="#6b7280">Tech leadership</text>
  </g>

  <g transform="translate(300, 300)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-38" cy="-5" r="18" fill="#f0fdf4"/>
    <text x="-38" y="-1" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="700">CMO</text>
    <text x="20" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2733">CMO Agent</text>
    <text x="20" y="6" text-anchor="middle" font-size="9" fill="#6b7280">Marketing &amp; GTM</text>
  </g>

  <g transform="translate(600, 300)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-38" cy="-5" r="18" fill="#fef3c7"/>
    <text x="-38" y="-1" text-anchor="middle" font-size="9" fill="#92400e" font-weight="700">CoS</text>
    <text x="20" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2733">Chief of Staff</text>
    <text x="20" y="6" text-anchor="middle" font-size="9" fill="#6b7280">Approval &amp; plans</text>
  </g>

  <g transform="translate(760, 300)">
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <circle cx="-38" cy="-5" r="18" fill="#f0fdf4"/>
    <text x="-38" y="-1" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="700">Fin</text>
    <text x="20" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#1c2733">Finance Agent</text>
    <text x="20" y="6" text-anchor="middle" font-size="9" fill="#6b7280">Economics &amp; billing</text>
