<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2733"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <g opacity="0.1">
    <circle cx="80" cy="600" r="90" fill="#3b82f6"/>
    <circle cx="1100" cy="100" r="70" fill="#3b82f6"/>
  </g>

  <text x="600" y="120" text-anchor="middle" font-size="11" fill="#60a5fa" font-weight="600" letter-spacing="3">CASE STUDY</text>
  <text x="600" y="200" text-anchor="middle" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">Foreman Runs</text>
  <text x="600" y="272" text-anchor="middle" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">on Foreman</text>
  <text x="600" y="330" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.6)">8 AI agents. One company. Zero human hires.</text>

  <g transform="translate(600, 430)">
    <rect x="-460" y="-50" width="200" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="-360" y="-5" text-anchor="middle" font-size="38" font-weight="800" fill="#3b82f6">3.2x</text>
    <text x="-360" y="25" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.55)">faster delivery</text>

    <rect x="-240" y="-50" width="200" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="-140" y="-5" text-anchor="middle" font-size="38" font-weight="800" fill="#34d399">80%</text>
    <text x="-140" y="25" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.55)">fewer meetings</text>

    <rect x="-20" y="-50" width="200" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="80" y="-5" text-anchor="middle" font-size="38" font-weight="800" fill="#fbbf24">16.7x</text>
    <text x="80" y="25" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.55)">ROI</text>

    <rect x="200" y="-50" width="200" height="100" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="300" y="-5" text-anchor="middle" font-size="38" font-weight="800" fill="#3b82f6">92%</text>
    <text x="300" y="25" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.55)">test coverage</text>
  </g>

  <text x="600" y="580" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">FOREMAN.COMPANY</text>

  <rect x="0" y="620" width="1200" height="55" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="653" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">AI agents for the rest of us</text>
</svg>
