<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1c2733" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="900" height="600" fill="#f8fafc" rx="16"/>

  <text x="450" y="46" text-anchor="middle" font-size="22" font-weight="800" fill="#1c2733" letter-spacing="-0.5">Foreman Impact Metrics</text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#6b7280">Measurable business outcomes from running on Foreman</text>

  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="380" height="100" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="24" y="36" font-size="13" fill="#6b7280" font-weight="500">Delivery Speed</text>
    <text x="24" y="72" font-size="42" font-weight="800" fill="#2563eb" letter-spacing="-2">3.2x</text>
    <text x="24" y="90" font-size="11" fill="#6b7280">faster feature delivery vs. traditional teams</text>
    <rect x="300" y="20" width="60" height="60" rx="30" fill="#eff6ff"/>
    <text x="330" y="58" text-anchor="middle" font-size="22" fill="#2563eb">⚡</text>
  </g>

  <g transform="translate(460, 100)">
    <rect x="0" y="0" width="380" height="100" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="24" y="36" font-size="13" fill="#6b7280" font-weight="500">Meeting Reduction</text>
    <text x="24" y="72" font-size="42" font-weight="800" fill="#10b981" letter-spacing="-2">80%</text>
    <text x="24" y="90" font-size="11" fill="#6b7280">fewer coordination meetings needed</text>
    <rect x="300" y="20" width="60" height="60" rx="30" fill="#f0fdf4"/>
    <text x="330" y="58" text-anchor="middle" font-size="22" fill="#10b981">📊</text>
  </g>

  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="380" height="100" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="24" y="36" font-size="13" fill="#6b7280" font-weight="500">Return on Investment</text>
    <text x="24" y="72" font-size="42" font-weight="800" fill="#f59e0b" letter-spacing="-2">16.7x</text>
    <text x="24" y="90" font-size="11" fill="#6b7280">ROI on AI agent operating costs</text>
    <rect x="300" y="20" width="60" height="60" rx="30" fill="#fef3c7"/>
    <text x="330" y="58" text-anchor="middle" font-size="22" fill="#f59e0b">💰</text>
  </g>

  <g transform="translate(460, 220)">
    <rect x="0" y="0" width="380" height="100" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="24" y="36" font-size="13" fill="#6b7280" font-weight="500">Test Coverage</text>
    <text x="24" y="72" font-size="42" font-weight="800" fill="#2563eb" letter-spacing="-2">92%</text>
    <text x="24" y="90" font-size="11" fill="#6b7280">automated test coverage maintained</text>
    <rect x="300" y="20" width="60" height="60" rx="30" fill="#eff6ff"/>
    <text x="330" y="58" text-anchor="middle" font-size="22" fill="#2563eb">✓</text>
  </g>

  <text x="450" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#1c2733">Traditional Team vs. Foreman AI Team</text>

  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="780" height="40" rx="8" fill="#f1f5f9"/>
    <text x="16" y="25" font-size="11" fill="#6b7280" font-weight="600">FEATURE DELIVERY</text>
    <text x="760" y="25" text-anchor="end" font-size="11" fill="#6b7280" font-weight="600">SPEED</text>
  </g>

  <g transform="translate(60, 440)">
    <text x="0" y="16" font-size="11" fill="#6b7280">Traditional</text>
    <rect x="110" y="0" width="260" height="24" rx="6" fill="#fecaca" opacity="0.6"/>
    <rect x="110" y="0" width="120" height="24" rx="6" fill="#ef4444"/>
    <text x="150" y="16" font-size="10" fill="#fff" font-weight="600">1x baseline</text>
    <text x="390" y="16" font-size="10" fill="#6b7280">~2 weeks per feature</text>
  </g>

  <g transform="translate(60, 474)">
    <text x="0" y="16" font-size="11" fill="#2563eb" font-weight="600">Foreman AI</text>
    <rect x="110" y="0" width="260" height="24" rx="6" fill="#dbeafe" opacity="0.6"/>
    <rect x="110" y="0" width="384" height="24" rx="6" fill="url(#barGrad1)"/>
    <text x="160" y="16" font-size="10" fill="#fff" font-weight="600">3.2x faster</text>
    <text x="390" y="16" font-size="10" fill="#2563eb" font-weight="600">~3 days per feature</text>
  </g>

  <g transform="translate(60, 516)">
    <text x="0" y="16" font-size="11" fill="#6b7280">Meetings</text>
    <rect x="110" y="0" width="260" height="24" rx="6" fill="#f1f5f9"/>
    <rect x="110" y="0" width="260" height="24" rx="6" fill="#94a3b8"/>
    <text x="180" y="16" font-size="10" fill="#fff" font-weight="600">Traditional: 15+ hrs/week</text>
  </g>

  <g transform="translate(60, 550)">
    <text x="0" y="16" font-size="11" fill="#10b981" font-weight="600">Foreman AI</text>
    <rect x="110" y="0" width="260" height="24" rx="6" fill="#f1f5f9"/>
    <rect x="110" y="0" width="52" height="24" rx="6" fill="url(#barGrad2)"/>
    <text x="130" y="16" font-size="10" fill="#fff" font-weight="600">3 hrs</text>
    <text x="390" y="16" font-size="10" fill="#10b981" font-weight="600">80% fewer meetings</text>
  </g>
</svg>
