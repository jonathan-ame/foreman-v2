<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1c2733" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2733"/>
      <stop offset="40%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="480" fill="url(#headerGrad)" rx="0"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <g opacity="0.15">
    <circle cx="100" cy="80" r="120" fill="#3b82f6"/>
    <circle cx="1100" cy="400" r="160" fill="#3b82f6"/>
    <circle cx="600" cy="50" r="80" fill="#60a5fa"/>
    <circle cx="200" cy="420" r="60" fill="#2563eb"/>
  </g>

  <g transform="translate(0,0)">
    <circle cx="160" cy="200" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="160" y="205" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" font-weight="600">CEO</text>
    <line x1="188" y1="200" x2="260" y2="170" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="188" y1="200" x2="260" y2="230" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

    <circle cx="280" cy="170" r="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="280" y="175" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.5)" font-weight="500">CTO</text>
    <circle cx="280" cy="230" r="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="280" y="235" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.5)" font-weight="500">CMO</text>

    <line x1="302" y1="170" x2="350" y2="145" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="302" y1="170" x2="350" y2="195" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="365" cy="145" r="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="365" y="149" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.4)">CC</text>
    <circle cx="365" cy="195" r="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="365" y="199" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.4)">CX</text>
  </g>

  <g transform="translate(600, 160)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#60a5fa" font-weight="600" letter-spacing="3" text-transform="uppercase">CASE STUDY</text>
    <text x="0" y="50" text-anchor="middle" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Foreman Runs</text>
    <text x="0" y="108" text-anchor="middle" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1.5">on Foreman</text>
    <text x="0" y="160" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.7)" font-weight="400">How we use 8 AI agents to build and operate our company</text>
    <text x="0" y="190" text-anchor="middle" font-size="15" fill="rgba(255,255,255,0.5)">3.2x faster delivery  ·  80% fewer meetings  ·  16.7x ROI</text>
  </g>

  <rect x="50" y="440" width="1100" height="2" rx="1" fill="url(#accentGrad)"/>

  <text x="600" y="466" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
</svg>
