<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="100" cy="900" r="90" fill="#3b82f6"/>
    <circle cx="980" cy="150" r="80" fill="#06b6d4"/>
  </g>

  <rect x="60" y="60" width="100" height="36" rx="18" fill="#06b6d4"/>
  <text x="110" y="84" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">DAY 4</text>

  <text x="540" y="180" text-anchor="middle" font-size="38" font-weight="800" fill="#fff" letter-spacing="-1">Your AI Chief of Staff</text>
  <text x="540" y="220" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.5)">How a Foreman agent works for you</text>

  <g transform="translate(140, 360)">
    <rect x="-80" y="-60" width="160" height="120" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-size="28" fill="#fff">💬</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">1. Describe</text>
    <text x="0" y="32" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">Tell it what</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">you need</text>
  </g>

  <line x1="220" y1="360" x2="320" y2="360" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(400, 360)">
    <rect x="-80" y="-60" width="160" height="120" rx="16" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-size="28" fill="#3b82f6">📋</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">2. Plan</text>
    <text x="0" y="32" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">Agent creates</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">execution plan</text>
  </g>

  <line x1="480" y1="360" x2="580" y2="360" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(660, 360)">
    <rect x="-80" y="-60" width="160" height="120" rx="16" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-size="28" fill="#06b6d4">⚡</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">3. Execute</text>
    <text x="0" y="32" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">Coordinates</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">specialized agents</text>
  </g>

  <line x1="740" y1="360" x2="840" y2="360" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(920, 360)">
    <rect x="-80" y="-60" width="160" height="120" rx="16" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-size="28" fill="#10b981">✅</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">4. Approve</text>
    <text x="0" y="32" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">You review</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">key decisions</text>
  </g>

  <g transform="translate(540, 580)">
    <rect x="-400" y="-80" width="800" height="160" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="0" y="-40" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.5)" font-weight="600">What your AI Chief of Staff does:</text>
    <text x="-280" y="0" font-size="14" fill="rgba(255,255,255,0.45)">• Creates execution plans</text>
    <text x="-280" y="28" font-size="14" fill="rgba(255,255,255,0.45)">• Coordinates marketing, research, ops</text>
    <text x="100" y="0" font-size="14" fill="rgba(255,255,255,0.45)">• Brings you key decisions</text>
    <text x="100" y="28" font-size="14" fill="rgba(255,255,255,0.45)">• Reports on progress 24/7</text>
  </g>

  <rect x="340" y="740" width="400" height="56" rx="28" fill="#3b82f6"/>
  <text x="540" y="774" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">That's Foreman v2</text>

  <text x="540" y="850" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
</svg>
