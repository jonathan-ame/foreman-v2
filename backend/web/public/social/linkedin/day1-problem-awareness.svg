<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="120" cy="140" r="100" fill="#3b82f6"/>
    <circle cx="960" cy="900" r="120" fill="#06b6d4"/>
  </g>

  <rect x="60" y="60" width="100" height="36" rx="18" fill="#3b82f6"/>
  <text x="110" y="84" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">DAY 1</text>

  <g transform="translate(540, 340)">
    <circle cx="0" cy="-30" r="80" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-size="56" fill="#fff">⏰</text>
  </g>

  <g transform="translate(540, 490)">
    <text x="0" y="0" text-anchor="middle" font-size="42" font-weight="800" fill="#fff" letter-spacing="-1">How many hours</text>
    <text x="0" y="52" text-anchor="middle" font-size="42" font-weight="800" fill="#fff" letter-spacing="-1">on repetitive tasks?</text>
  </g>

  <g transform="translate(540, 630)">
    <rect x="-340" y="-35" width="680" height="70" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <g transform="translate(-280, 0)">
      <rect x="-24" y="-20" width="48" height="40" rx="8" fill="rgba(59,130,246,0.2)"/>
      <text x="0" y="8" text-anchor="middle" font-size="20" fill="#3b82f6">✉️</text>
      <text x="50" y="-6" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="500">EMAIL</text>
      <text x="50" y="14" font-size="11" fill="rgba(255,255,255,0.3)">follow-ups</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-24" y="-20" width="48" height="40" rx="8" fill="rgba(6,182,212,0.2)"/>
      <text x="0" y="8" text-anchor="middle" font-size="20" fill="#06b6d4">📊</text>
      <text x="50" y="-6" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="500">DATA</text>
      <text x="50" y="14" font-size="11" fill="rgba(255,255,255,0.3)">entry</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-24" y="-20" width="48" height="40" rx="8" fill="rgba(251,191,36,0.2)"/>
      <text x="0" y="8" text-anchor="middle" font-size="20" fill="#fbbf24">📅</text>
      <text x="50" y="-6" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="500">SCHED</text>
      <text x="50" y="14" font-size="11" fill="rgba(255,255,255,0.3)">planning</text>
    </g>
  </g>

  <rect x="340" y="740" width="400" height="56" rx="28" fill="#3b82f6"/>
  <text x="540" y="774" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">Delegate to your AI team</text>

  <text x="540" y="850" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
  <text x="540" y="878" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.25)">AI agents for the rest of us</text>
</svg>
