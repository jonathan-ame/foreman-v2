<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="160" cy="920" r="90" fill="#06b6d4"/>
    <circle cx="920" cy="160" r="80" fill="#3b82f6"/>
  </g>

  <text x="540" y="120" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600" letter-spacing="3">METRICS TEMPLATE</text>

  <text x="540" y="190" text-anchor="middle" font-size="38" font-weight="800" fill="#fff" letter-spacing="-1">Key metric headline</text>
  <text x="540" y="225" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.45)">Supporting description</text>

  <g transform="translate(540, 440)">
    <rect x="-380" y="-140" width="240" height="280" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="-260" y="-70" text-anchor="middle" font-size="56" font-weight="800" fill="#3b82f6" letter-spacing="-2">N</text>
    <text x="-260" y="-20" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.45)">Metric 1 label</text>
    <line x1="-360" y1="10" x2="-160" y2="10" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="-260" y="50" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.3)">Description</text>
  </g>

  <g transform="translate(540, 440)">
    <rect x="-120" y="-140" width="240" height="280" rx="20" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>
    <text x="0" y="-70" text-anchor="middle" font-size="56" font-weight="800" fill="#3b82f6" letter-spacing="-2">N</text>
    <text x="0" y="-20" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.5)">Metric 2 label</text>
    <line x1="-100" y1="10" x2="100" y2="10" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
    <text x="0" y="50" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">Description</text>
  </g>

  <g transform="translate(540, 440)">
    <rect x="140" y="-140" width="240" height="280" rx="20" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="260" y="-70" text-anchor="middle" font-size="56" font-weight="800" fill="#06b6d4" letter-spacing="-2">N</text>
    <text x="260" y="-20" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.45)">Metric 3 label</text>
    <line x1="160" y1="10" x2="360" y2="10" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
    <text x="260" y="50" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.3)">Description</text>
  </g>

  <g transform="translate(540, 680)">
    <rect x="-160" y="-28" width="320" height="56" rx="28" fill="#3b82f6"/>
    <text x="0" y="5" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">Learn More</text>
  </g>

  <text x="540" y="830" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
</svg>
