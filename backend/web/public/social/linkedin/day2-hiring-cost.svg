<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="960" cy="120" r="100" fill="#3b82f6"/>
    <circle cx="120" cy="920" r="80" fill="#06b6d4"/>
  </g>

  <rect x="60" y="60" width="100" height="36" rx="18" fill="#06b6d4"/>
  <text x="110" y="84" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">DAY 2</text>

  <text x="540" y="180" text-anchor="middle" font-size="38" font-weight="800" fill="#fff" letter-spacing="-1">The real cost of hiring</text>

  <g transform="translate(540, 380)">
    <rect x="-400" y="-140" width="360" height="280" rx="20" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="2"/>
    <text x="-220" y="-80" text-anchor="middle" font-size="14" fill="rgba(239,68,68,0.7)" font-weight="600" letter-spacing="1">HUMAN HIRE</text>
    <text x="-220" y="-20" text-anchor="middle" font-size="56" font-weight="800" fill="#ef4444" letter-spacing="-2">$3k–6k</text>
    <text x="-220" y="20" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.5)">per month</text>
    <line x1="-380" y1="50" x2="-60" y2="50" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <text x="-220" y="80" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">+ Recruiting costs</text>
    <text x="-220" y="100" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">+ Benefits &amp; overhead</text>
    <text x="-220" y="120" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">+ Training &amp; onboarding</text>
  </g>

  <g transform="translate(540, 380)">
    <rect x="40" y="-140" width="360" height="280" rx="20" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="2"/>
    <text x="220" y="-80" text-anchor="middle" font-size="14" fill="rgba(52,211,153,0.7)" font-weight="600" letter-spacing="1">AI AGENT</text>
    <text x="220" y="-20" text-anchor="middle" font-size="56" font-weight="800" fill="#10b981" letter-spacing="-2">$49–199</text>
    <text x="220" y="20" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.5)">per month</text>
    <line x1="60" y1="50" x2="380" y2="50" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
    <text x="220" y="80" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">No recruiting needed</text>
    <text x="220" y="100" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">No overhead costs</text>
    <text x="220" y="120" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)">Works 24/7 instantly</text>
  </g>

  <g transform="translate(540, 570)">
    <text x="0" y="40" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.4)">—</text>
  </g>

  <rect x="300" y="700" width="480" height="60" rx="30" fill="url(#savingsGrad)"/>
  <defs>
    <linearGradient id="savingsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect x="300" y="700" width="480" height="60" rx="30" fill="url(#savingsGrad)"/>
  <text x="540" y="736" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">Save up to 97% on ops costs</text>

  <text x="540" y="830" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
  <text x="540" y="858" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.25)">Scale your business with AI, not headcount</text>
</svg>
