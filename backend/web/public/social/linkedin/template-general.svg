<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="160" cy="160" r="80" fill="#3b82f6"/>
    <circle cx="920" cy="920" r="100" fill="#06b6d4"/>
  </g>

  <text x="540" y="140" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600" letter-spacing="3">SOCIAL MEDIA TEMPLATE</text>

  <g transform="translate(540, 300)">
    <rect x="-420" y="-120" width="840" height="240" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="0" y="-60" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="500">HEADLINE</text>
    <line x1="-380" y1="-40" x2="380" y2="-40" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="0" y="10" text-anchor="middle" font-size="42" font-weight="800" fill="#fff" letter-spacing="-1">Your headline here</text>
    <text x="0" y="60" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.45)">Supporting subtitle or key message</text>
  </g>

  <g transform="translate(540, 560)">
    <rect x="-420" y="-80" width="840" height="160" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="0" y="-40" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.3)" font-weight="500">BODY / KEY POINTS</text>
    <line x1="-380" y1="-20" x2="380" y2="-20" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="-320" y="15" font-size="14" fill="rgba(255,255,255,0.4)">• Key point one</text>
    <text x="-320" y="42" font-size="14" fill="rgba(255,255,255,0.4)">• Key point two</text>
    <text x="-320" y="69" font-size="14" fill="rgba(255,255,255,0.4)">• Key point three</text>
  </g>

  <g transform="translate(540, 730)">
    <rect x="-160" y="-28" width="320" height="56" rx="28" fill="#3b82f6"/>
    <text x="0" y="5" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">CTA BUTTON</text>
  </g>

  <text x="540" y="850" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
  <text x="540" y="878" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.25)">Brand: #3B82F6 #06B6D4 #1F2937 #F9FAFB | Font: Inter</text>
</svg>
