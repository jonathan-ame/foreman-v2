<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="200" cy="860" r="100" fill="#06b6d4"/>
    <circle cx="880" cy="200" r="80" fill="#3b82f6"/>
  </g>

  <text x="540" y="120" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600" letter-spacing="3">QUOTE TEMPLATE</text>

  <rect x="120" y="160" width="840" height="4" rx="2" fill="#3b82f6"/>

  <g transform="translate(540, 420)">
    <text x="0" y="-60" text-anchor="middle" font-size="80" fill="rgba(59,130,246,0.15)" font-weight="800">"</text>
    <text x="0" y="0" text-anchor="middle" font-size="32" font-weight="600" fill="#fff" letter-spacing="-0.5">Your quote goes here.</text>
    <text x="0" y="48" text-anchor="middle" font-size="32" font-weight="600" fill="#06b6d4" letter-spacing="-0.5">Add a second line if needed.</text>
  </g>

  <rect x="120" y="520" width="840" height="4" rx="2" fill="#06b6d4"/>

  <g transform="translate(540, 600)">
    <text x="0" y="0" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.6)" font-weight="600">— Author Name</text>
    <text x="0" y="28" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.35)">Title / Role</text>
  </g>

  <text x="540" y="750" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
</svg>
