<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="40%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1200" height="627" fill="url(#bgGrad)"/>
  <rect width="1200" height="627" fill="url(#grid)"/>

  <g opacity="0.1">
    <circle cx="200" cy="150" r="120" fill="#3b82f6"/>
    <circle cx="1000" cy="500" r="150" fill="#06b6d4"/>
    <circle cx="600" cy="80" r="80" fill="#60a5fa"/>
  </g>

  <g transform="translate(600, 170)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#60a5fa" font-weight="600" letter-spacing="4">ANNOUNCING</text>
    <text x="0" y="60" text-anchor="middle" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-2">Foreman v2</text>
    <text x="0" y="100" text-anchor="middle" font-size="20" fill="rgba(255,255,255,0.6)">Your AI Team, Ready in Minutes</text>
  </g>

  <g transform="translate(180, 320)">
    <rect x="-140" y="-55" width="280" height="110" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="0" y="-15" text-anchor="middle" font-size="40" font-weight="800" fill="#3b82f6">3.2x</text>
    <text x="0" y="10" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.55)">faster delivery</text>
    <text x="0" y="30" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)">than traditional teams</text>
  </g>

  <g transform="translate(480, 320)">
    <rect x="-140" y="-55" width="280" height="110" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="0" y="-15" text-anchor="middle" font-size="40" font-weight="800" fill="#10b981">80%</text>
    <text x="0" y="10" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.55)">fewer meetings</text>
    <text x="0" y="30" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)">async coordination</text>
  </g>

  <g transform="translate(780, 320)">
    <rect x="-140" y="-55" width="280" height="110" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="0" y="-15" text-anchor="middle" font-size="40" font-weight="800" fill="#fbbf24">16.7x</text>
    <text x="0" y="10" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.55)">ROI</text>
    <text x="0" y="30" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)">on agent operating costs</text>
  </g>

  <g transform="translate(1040, 320)">
    <rect x="-90" y="-55" width="180" height="110" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="0" y="-15" text-anchor="middle" font-size="40" font-weight="800" fill="#3b82f6">92%</text>
    <text x="0" y="10" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.55)">test coverage</text>
    <text x="0" y="30" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)">automated QA</text>
  </g>

  <g transform="translate(600, 470)">
    <rect x="-200" y="-24" width="400" height="48" rx="24" fill="#3b82f6"/>
    <text x="0" y="5" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">Join the Waitlist</text>
  </g>

  <text x="600" y="550" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">NO-CODE AI AGENTS  ·  MANAGED OPERATIONS  ·  SCALE SMART</text>

  <rect x="0" y="587" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="600" y="612" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" font-weight="500">foreman.company</text>
</svg>
