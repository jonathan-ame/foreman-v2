<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <g opacity="0.08">
    <circle cx="180" cy="180" r="80" fill="#06b6d4"/>
    <circle cx="900" cy="860" r="100" fill="#3b82f6"/>
  </g>

  <rect x="60" y="60" width="100" height="36" rx="18" fill="#3b82f6"/>
  <text x="110" y="84" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">DAY 3</text>

  <text x="540" y="190" text-anchor="middle" font-size="38" font-weight="800" fill="#fff" letter-spacing="-1">AI for business owners,</text>
  <text x="540" y="240" text-anchor="middle" font-size="38" font-weight="800" fill="#06b6d4" letter-spacing="-1">not engineers</text>

  <g transform="translate(540, 480)">
    <rect x="-360" y="-200" width="720" height="400" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <g transform="translate(-200, -120)">
      <circle cx="0" cy="0" r="50" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <text x="0" y="8" text-anchor="middle" font-size="32" fill="#fff">👤</text>
      <text x="0" y="80" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.6)" font-weight="600">You</text>
      <text x="0" y="100" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.3)">Business Owner</text>
    </g>

    <g transform="translate(0, -120)">
      <rect x="-70" y="-40" width="140" height="80" rx="16" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="2"/>
      <text x="0" y="-8" text-anchor="middle" font-size="28" fill="#3b82f6">🧩</text>
      <text x="0" y="18" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)" font-weight="600">No-Code</text>
      <text x="0" y="34" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.35)">Connection</text>
    </g>

    <g transform="translate(200, -120)">
      <circle cx="0" cy="0" r="50" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="2"/>
      <text x="0" y="8" text-anchor="middle" font-size="32" fill="#06b6d4">🤖</text>
      <text x="0" y="80" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.6)" font-weight="600">AI Team</text>
      <text x="0" y="100" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.3)">Ready to work</text>
    </g>

    <line x1="-150" y1="-120" x2="-70" y2="-120" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="70" y1="-120" x2="150" y2="-120" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,4"/>

    <g transform="translate(0, 60)">
      <rect x="-300" y="-30" width="600" height="60" rx="12" fill="rgba(255,255,255,0.04)"/>
      <text x="-220" y="5" font-size="13" fill="rgba(255,255,255,0.45)">❌ Python</text>
      <text x="-100" y="5" font-size="13" fill="rgba(255,255,255,0.45)">❌ APIs</text>
      <text x="10" y="5" font-size="13" fill="rgba(255,255,255,0.45)">❌ DevOps</text>
      <text x="130" y="5" font-size="13" fill="#10b981" font-weight="600">✓ Plain English</text>
    </g>

    <g transform="translate(0, 140)">
      <text x="0" y="0" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.6)">Describe what you need.</text>
      <text x="0" y="24" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.6)">Your AI team handles the rest.</text>
    </g>
  </g>

  <text x="540" y="830" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="1">FOREMAN.COMPANY</text>
  <text x="540" y="858" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.25)">No-code AI agents for small business</text>
</svg>
